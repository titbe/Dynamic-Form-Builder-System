version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: form-management-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: form_management
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  be:
    build:
      context: ./BE
      dockerfile: Dockerfile
    container_name: form-management-be
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/form_management?schema=public
      JWT_SECRET: change_me
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
      SW_EMAIL: sw@example.com
      SW_PASSWORD: sw123456
    depends_on:
      - postgres

  fe:
    build:
      context: ./FE
      dockerfile: Dockerfile
    container_name: form-management-fe
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - be

volumes:
  postgres_data:
