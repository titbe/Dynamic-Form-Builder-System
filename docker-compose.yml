services:
  postgres:
    image: postgres:16
    container_name: form-management-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: form_management
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: form-management-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  be:
    build:
      context: ./BE
      dockerfile: Dockerfile
    container_name: form-management-be
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/form_management?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
      SW_EMAIL: sw@example.com
      SW_PASSWORD: sw123456
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - postgres
      - redis

  fe:
    build:
      context: ./FE
      dockerfile: Dockerfile
    container_name: form-management-fe
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    depends_on:
      - be

volumes:
  postgres_data:
  redis_data:
